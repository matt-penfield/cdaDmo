<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDLC Approval &amp; Governance</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="material-symbols-outlined">hub</span>
      <span class="nav-title">PDLC Governance</span>
    </div>
    <div class="nav-right">
      <button class="nav-tab active" data-view="artifacts">
        <span class="material-symbols-outlined">description</span>
        Review History
      </button>
      <div class="nav-user">
        <span class="material-symbols-outlined">account_circle</span>
        <select id="current-user"></select>
      </div>
    </div>
  </nav>

  <!-- Artifact List View -->
  <main id="view-artifacts" class="view">
    <header class="view-header">
      <h1>Artifacts</h1>
      <div class="filters">
        <select id="filter-phase">
          <option value="">All Phases</option>
        </select>
        <select id="filter-status">
          <option value="">All Statuses</option>
          <option value="Pending">Pending</option>
          <option value="Approved">Approved</option>
          <option value="Approved with Conditions">Approved with Conditions</option>
          <option value="Rejected">Rejected</option>
        </select>
        <select id="filter-source">
          <option value="">All Sources</option>
        </select>
      </div>
    </header>
    <div class="table-wrapper">
      <table id="artifacts-table">
        <thead>
          <tr>
            <th data-sort="name">Artifact <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
            <th data-sort="source_app">Source <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
            <th data-sort="phase">Phase <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
            <th data-sort="contributor">Contributor <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
            <th data-sort="status">Status <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
            <th data-sort="updated_at">Updated <span class="material-symbols-outlined sort-icon">unfold_more</span></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <!-- Artifact Detail View (Single Pane of Glass) -->
  <main id="view-detail" class="view active">
    <div class="detail-layout">
      <aside class="detail-sidebar">
        <div class="sidebar-header">
          <span class="material-symbols-outlined">hub</span>
          <span>Approval Queue</span>
        </div>
        <ul id="detail-artifact-list" class="sidebar-list"></ul>
      </aside>
      <section class="detail-main">
        <div class="detail-topbar">
          <div class="detail-breadcrumb" id="detail-breadcrumb"></div>
          <button class="btn btn-primary" id="detail-review-btn">
            <span class="material-symbols-outlined">rate_review</span>
            Review
          </button>
        </div>
        <div class="detail-content" id="detail-content"></div>
      </section>
    </div>
  </main>

  <!-- Approval Modal -->
  <div id="approval-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Submit Approval</h2>
        <button class="modal-close" id="modal-close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-artifact-info">
          <p class="modal-artifact-name" id="modal-artifact-name"></p>
          <p class="modal-artifact-meta" id="modal-artifact-meta"></p>
        </div>
        <form id="approval-form">
          <input type="hidden" id="approval-artifact-id">

          <div class="form-group">
            <label for="approval-decision">Decision <span class="required">*</span></label>
            <select id="approval-decision" required>
              <option value="">Select a decision…</option>
              <option value="Approved">Approved</option>
              <option value="Approved with Conditions">Approved with Conditions</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>

          <div class="form-group">
            <label for="approval-reason">Reason <span class="required">*</span></label>
            <textarea id="approval-reason" rows="4" placeholder="Explain your rationale…" required></textarea>
          </div>

          <div class="form-group">
            <label for="approval-date">Date <span class="required">*</span></label>
            <input type="date" id="approval-date" required>
          </div>

          <div class="form-group">
            <label>Approver</label>
            <p class="form-static" id="approval-approver"></p>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit Approval</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
